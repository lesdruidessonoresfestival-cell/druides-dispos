<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Disponibilités – Les Druides Sonores</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;min-height:100vh;font-family:'Inter',sans-serif;color:#E8E0FF;padding-bottom:60px}
input,button{font-family:'Inter',sans-serif}
input::placeholder{color:#3D3060}
input:focus{outline:none;border-color:rgba(123,47,190,0.9)!important}
.header{text-align:center;padding:44px 20px 28px;position:relative}
.header-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:200px;background:radial-gradient(ellipse at center,rgba(123,47,190,0.32) 0%,transparent 70%);pointer-events:none}
.label-festival{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:#F0C040;font-weight:700;margin-bottom:10px}
.title{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,6vw,40px);font-weight:800;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#E8E0FF 0%,#a78bfa 55%,#7B2FBE 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#7B6FA8;font-size:14px}
.nom-wrap{max-width:500px;margin:0 auto 32px;padding:0 20px}
.nom-box{background:rgba(123,47,190,0.1);border:1px solid rgba(123,47,190,0.4);border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;gap:12px}
.nom-label{font-size:12px;font-weight:700;color:#c4b5fd;letter-spacing:0.1em;text-transform:uppercase}
.nom-row{display:flex;gap:10px}
.nom-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(123,47,190,0.5);border-radius:8px;padding:10px 14px;color:#E8E0FF;font-size:15px}
.nom-btn{background:linear-gradient(135deg,#7B2FBE,#5B1F9E);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap}
.nom-set{display:flex;align-items:center;justify-content:space-between;background:rgba(123,47,190,0.13);border:1px solid rgba(123,47,190,0.4);border-radius:10px;padding:10px 16px}
.nom-set span{font-size:14px;color:#c4b5fd}
.nom-set strong{color:#fff}
.changer-btn{background:none;border:none;color:#7B2FBE;font-size:12px;text-decoration:underline;cursor:pointer}
.grille{max-width:1100px;margin:0 auto;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.day-header{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(123,47,190,0.25)}
.day-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:#E8E0FF}
.day-date{font-size:13px;color:#F0C040;font-weight:600;margin-top:2px}
.slots{display:flex;flex-direction:column;gap:8px}
.slot{border-radius:10px;padding:12px 14px;transition:background 0.15s,border 0.15s,box-shadow 0.15s;position:relative;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.025)}
.slot.clickable{cursor:pointer}
.slot.clickable:hover{background:rgba(255,255,255,0.04)}
.slot.voted{background:rgba(123,47,190,0.22)!important;border-color:rgba(123,47,190,0.7)!important;box-shadow:0 0 14px rgba(123,47,190,0.18)}
.slot.top{border-color:rgba(240,192,64,0.35);box-shadow:0 0 8px rgba(240,192,64,0.08)}
.slot-bar{position:absolute;left:0;top:0;bottom:0;border-radius:10px;pointer-events:none}
.slot-row{display:flex;align-items:center;justify-content:space-between;position:relative}
.slot-left{display:flex;align-items:center;gap:9px}
.checkbox{width:18px;height:18px;border-radius:5px;border:2px solid rgba(255,255,255,0.18);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#fff}
.checkbox.checked{border-color:#7B2FBE;background:linear-gradient(135deg,#7B2FBE,#5B1F9E)}
.slot-label{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#7B6FA8}
.slot.voted .slot-label{color:#c4b5fd}
.slot-right{display:flex;align-items:center;gap:8px}
.top-badge{font-size:11px;color:#F0C040}
.count{font-size:13px;font-weight:700;color:#4A3D6E}
.slot.voted .count{color:#a78bfa}
.slot.top .count{color:#F0C040}
.badges{display:flex;flex-wrap:wrap;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:3px;background:rgba(123,47,190,0.22);border:1px solid rgba(123,47,190,0.55);border-radius:20px;padding:2px 10px;font-size:12px;color:#D9C4FF;font-weight:500;margin:2px}
.badge-remove{background:none;border:none;color:#a78bfa;font-size:14px;padding:0 0 0 2px;line-height:1;cursor:pointer}
.footer{text-align:center;margin-top:28px;font-size:12px;color:#3D3560;transition:color 0.3s}
.footer.saved{color:#a78bfa;font-weight:600}
.hint{text-align:center;margin-top:10px;font-size:13px;color:#4A3D6E}
</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <div class="label-festival">Les Druides Sonores</div>
  <div class="title">Session de travail<br/>17 · 18 · 19 juillet</div>
  <p class="subtitle">Coche tes créneaux · Plusieurs choix possibles · Temps réel 🔥</p>
</div>

<div class="nom-wrap">
  <div id="nom-saisie" class="nom-box">
    <div class="nom-label">Ton prénom pour voter</div>
    <div class="nom-row">
      <input class="nom-input" id="nom-input" type="text" placeholder="Ex : Masloow" autocomplete="off"/>
      <button class="nom-btn" id="nom-btn">Go →</button>
    </div>
  </div>
  <div id="nom-confirme" class="nom-set" style="display:none">
    <span>Tu votes en tant que <strong id="nom-display"></strong></span>
    <button class="changer-btn" id="changer-btn">Changer</button>
  </div>
</div>

<div class="grille" id="grille"></div>

<div id="footer" class="footer">Votes synchronisés en temps réel · Firebase 🔥</div>
<div id="hint" class="hint">👆 Entre ton prénom pour voter</div>

<script>
const DB = "https://druides-b4f7a-default-rtdb.europe-west1.firebasedatabase.app/session-juillet-2";

const DAYS = [
  { id: "ven", label: "Vendredi", date: "17 juillet" },
  { id: "sam", label: "Samedi",   date: "18 juillet" },
  { id: "dim", label: "Dimanche", date: "19 juillet" },
];

const SLOTS = Array.from({ length: 4 }, (_, i) => {
  const h = 14 + i * 2;
  return { id: String(h), label: `${h}h – ${h + 2}h` };
});

let votes = {};
let currentName = "";
let nameSet = false;

async function fbGet() {
  const r = await fetch(`${DB}.json`);
  return r.ok ? await r.json() : null;
}
async function fbSet(path, value) {
  return fetch(`${DB}/${path}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(value),
  });
}
async function fbDelete(path) {
  return fetch(`${DB}/${path}.json`, { method: "DELETE" });
}

function getVoters(dayId, slotId) {
  return Object.values(votes[`${dayId}_${slotId}`] || {});
}
function hasVoted(dayId, slotId) {
  return getVoters(dayId, slotId).includes(currentName);
}
function getVoteKey(dayId, slotId) {
  const raw = votes[`${dayId}_${slotId}`] || {};
  return Object.keys(raw).find(k => raw[k] === currentName);
}
function maxVotes() {
  const vals = Object.values(votes).map(v => Object.values(v || {}).length);
  return vals.length ? Math.max(...vals, 0) : 0;
}

async function toggleVote(dayId, slotId) {
  if (!nameSet) return;
  const key = `${dayId}_${slotId}`;
  try {
    if (hasVoted(dayId, slotId)) {
      await fbDelete(`${key}/${getVoteKey(dayId, slotId)}`);
    } else {
      const vKey = `v_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,6)}`;
      await fbSet(`${key}/${vKey}`, currentName);
    }
    showStatus("✓ Sauvegardé");
    await loadVotes();
  } catch {
    showStatus("❌ Erreur");
  }
}

function showStatus(msg) {
  const f = document.getElementById("footer");
  f.textContent = msg;
  f.className = "footer saved";
  setTimeout(() => { f.textContent = "Votes synchronisés en temps réel · Firebase 🔥"; f.className = "footer"; }, 1500);
}

function renderGrille() {
  const mv = maxVotes();
  document.getElementById("grille").innerHTML = DAYS.map(day => `
    <div>
      <div class="day-header">
        <div class="day-name">${day.label}</div>
        <div class="day-date">${day.date}</div>
      </div>
      <div class="slots">
        ${SLOTS.map(slot => {
          const voters = getVoters(day.id, slot.id);
          const voted  = hasVoted(day.id, slot.id);
          const count  = voters.length;
          const isTop  = count > 0 && count === mv;
          const pct    = mv > 0 ? Math.round((count / mv) * 100) : 0;
          return `
            <div class="slot ${nameSet?'clickable':''} ${voted?'voted':''} ${isTop&&!voted?'top':''}"
                 onclick="toggleVote('${day.id}','${slot.id}')">
              ${count>0?`<div class="slot-bar" style="width:${pct}%;background:${isTop?'linear-gradient(90deg,rgba(240,192,64,0.07),transparent)':'linear-gradient(90deg,rgba(123,47,190,0.09),transparent)'}"></div>`:''}
              <div class="slot-row" style="margin-bottom:${count>0?'8px':'0'}">
                <div class="slot-left">
                  <div class="checkbox ${voted?'checked':''}">${voted?'✓':''}</div>
                  <span class="slot-label">${slot.label}</span>
                </div>
                <div class="slot-right">
                  ${isTop?'<span class="top-badge">⭐ Top</span>':''}
                  ${count>0?`<span class="count">${count} dispo${count>1?'s':''}</span>`:''}
                </div>
              </div>
              ${voters.length>0?`
                <div class="badges" onclick="event.stopPropagation()">
                  ${voters.map(v=>`
                    <span class="badge">${v}${nameSet&&v===currentName?`<button class="badge-remove" onclick="event.stopPropagation();toggleVote('${day.id}','${slot.id}')">×</button>`:''}</span>
                  `).join('')}
                </div>`:''}
            </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

async function loadVotes() {
  try { votes = await fbGet() || {}; renderGrille(); } catch(e) { console.error(e); }
}

function handleSetName() {
  const t = document.getElementById("nom-input").value.trim();
  if (!t) return;
  currentName = t; nameSet = true;
  document.getElementById("nom-saisie").style.display = "none";
  document.getElementById("nom-confirme").style.display = "flex";
  document.getElementById("nom-display").textContent = currentName;
  document.getElementById("hint").style.display = "none";
  renderGrille();
}

function handleChangeName() {
  currentName = ""; nameSet = false;
  document.getElementById("nom-saisie").style.display = "flex";
  document.getElementById("nom-confirme").style.display = "none";
  document.getElementById("nom-input").value = "";
  document.getElementById("hint").style.display = "block";
  renderGrille();
}

document.getElementById("nom-btn").addEventListener("click", handleSetName);
document.getElementById("nom-input").addEventListener("keydown", e => { if(e.key==="Enter") handleSetName(); });
document.getElementById("changer-btn").addEventListener("click", handleChangeName);

loadVotes();
setInterval(loadVotes, 3000);
</script>
</body>
</html>
